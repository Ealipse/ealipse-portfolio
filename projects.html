<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Ealipse</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="projects-page">

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo-wrap">
      <img src="images/White.png" class="logo">
      <span class="nav-text">EALIPSE</span>
    </a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="projects.html" class="active">Projects</a>
    </div>
  </div>
</nav>

<div class="bg-image">
  <img src="images/Background1.png">
</div>

<div class="projects-layout">
  <aside class="projects-sidebar">
    <div class="panel filters-panel">
      <p class="label">Filters</p>

      <label class="filter-control">
        <span>Search</span>
        <input type="search" id="projectSearch" placeholder="Map, author, style">
      </label>

      <label class="filter-control">
        <span>Sort by</span>
        <select id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="awards-desc">Most awards</option>
          <option value="awards-asc">Fewest awards</option>
          <option value="author-asc">Fastest author time</option>
          <option value="author-desc">Slowest author time</option>
          <option value="name">Name A-Z</option>
        </select>
      </label>

      <label class="filter-control">
        <span>Style</span>
        <select id="tagFilter">
          <option value="">All styles</option>
        </select>
      </label>

      <div class="filter-footer">
        <span id="projectCount">0 maps</span>
        <button type="button" class="filter-reset" id="resetFilters">Reset</button>
      </div>
    </div>
  </aside>

  <main class="projects-main">
    <section class="projects-header">
      <p class="label">Projects</p>
      <h1>Trackmania Maps</h1>
    </section>

    <div class="grid projects-grid"></div>
  </main>
</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-left">
      <div class="footer-brand">
        <img src="images/White.png" class="footer-logo">
        <span>Ealipse</span>
      </div>
      <p>Trackmania Level Designer</p>
    </div>

    <div class="footer-center"></div>

    <div class="footer-right">
      <p>© 2026 Ealipse</p>
    </div>
  </div>
</footer>

<script src="maps.js"></script>
<script src="siteStats.js"></script>
<script src="script.js"></script>

</body>
</html>
